<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>HomePage</title>
</head>

<body>
    <header class="header">
        <!-- Top bar -->
        <div class="header__top-bar 
        bg-[#141414] 
        h-[74px] md:h-[45px] lg:h-[67px]
        flex justify-center items-center
        pt-10 px-6 pb-[14px] 
        md:py-3 
        lg:py-5     
        gap-[10px]
        border-b-[1px] border-[#262626]
        ">
            <p class="text-[#98989A] 
            font-sans 
            font-normal 
            text-[12px] md:text-[14px] lg:text-[18px]
            ">
                Subscribe to our Newsletter For New & latest Blogs and Resources
            </p>
            <img class="inline-block 
            w-5 lg:w-6
            h-5 lg:h-6" src="/assets/icons/Icon.png" alt="icon-top-bar">
        </div>

        <!-- Main header -->
        <div class=" header__main 
            h-[75px] md:h-[81px] lg:h-[103px]
            bg-[#1A1A1A] 
            py-5 px-4 
            md:px-20 
            lg:py-6 lg:px-[162px]
            flex justify-between items-center 
            border-y border-[#262626]
            ">
            <div class="header__logo cursor-pointer">
                <img class="h-[35px] md:min-w-[144px] md:h-[40px] lg:h-[50px]" src="./assets/images/logo/Logo.png"
                    alt="logo">
            </div>

            <nav class="header__nav 
            hidden md:block
            ">
                <ul class="md:flex md:gap-6">
                    <li class=""><a href="#" class="md:font-sans md:font-normal md:text-[14px] lg:text-[18px] md:text-[#7E7E81] 
                            md:py-[10px] md:px-[18px] 
                            lg:py-[14px] lg:px-6 
                            md:hover:bg-[#141414]
                            md:hover:border-[1px] 
                            md:hover:border-[#333333]
                            md:hover:rounded-[6px]
                            md:hover:font-bold
                            md:hover:text-[#ffffff]
                            ">Home</a>
                    </li>
                    <li class=""><a href="#" class="md:font-sans md:font-normal md:text-[14px] lg:text-[18px] md:text-[#7E7E81]
                            md:py-[10px] md:px-[18px]
                            lg:py-[14px] lg:px-6 
                            md:hover:bg-[#141414]
                            md:hover:border-[1px] 
                            md:hover:border-[#333333]
                            md:hover:rounded-[6px]
                            md:hover:font-bold
                            md:hover:text-[#ffffff]
                            ">News</a></li>
                    <li class=""><a href="#" class="md:font-sans md:font-normal md:text-[14px] lg:text-[18px] md:text-[#7E7E81]
                            md:py-[10px] md:px-[18px]
                            lg:py-[14px] lg:px-6 
                            md:hover:bg-[#141414]
                            md:hover:border-[1px] 
                            md:hover:border-[#333333]
                            md:hover:rounded-[6px]
                            md:hover:font-bold
                            md:hover:text-[#ffffff]
                            ">Podcasts</a></li>
                    <li class=""><a href="#" class="md:font-sans md:font-normal md:text-[14px] lg:text-[18px] md:text-[#7E7E81]
                            md:py-[10px] md:px-[18px]
                            lg:py-[14px] lg:px-6 
                            md:hover:bg-[#141414]
                            md:hover:border-[1px] 
                            md:hover:border-[#333333]
                            md:hover:rounded-[6px]
                            md:hover:font-bold
                            md:hover:text-[#ffffff]
                            ">Resources</a></li>
                </ul>
            </nav>
            <img class="inline-block w-[34px] h-[34px] md:hidden" src="/assets/icons/Icon-menu.png" alt="icon-menu">

            <div class="header__button 
            hidden md:block
            ">
                <button class="md:font-sans md:text-[14px] lg:text-[18px]
                md:min-w-[103px] md:h-[41px]
                lg:min-w-[137px] lg:min-h-[55px]
                md:font-medium 
                md:text-[#141414] 
                md:bg-[#FFD11A] 
                md:py-[10px] md:px-[14px]
                lg:py-[14px] lg:px-5
                md:rounded-[6px]
                md:cursor-pointer
                ">Contact Us</button>
            </div>
        </div>
    </header>
    <main></main>
    <footer></footer>
</body>

</html>
